<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA SAGRADO ETERNO - RECUPERADOR V3</title>
    <style>
        body { background-color: #000; color: #00ff00; font-family: 'Courier New', monospace; margin: 0; text-align: center; overflow-x: hidden; }
        #status-fixo { position: sticky; top: 0; background: rgba(0,50,0,0.9); padding: 20px; border-bottom: 3px double gold; z-index: 1000; }
        h1 { color: #00ff00; text-shadow: 0 0 10px gold; }
        .container { padding: 20px; }
        img { border: 4px solid gold; border-radius: 15px; margin: 20px 0; box-shadow: 0 0 30px rgba(255,215,0,0.5); max-width: 90%; }
        #log-sistema { background: #111; color: #0f0; font-size: 12px; text-align: left; padding: 15px; border: 1px solid #333; height: 120px; overflow-y: auto; margin: 20px; }
        iframe { border: 2px solid #333; border-radius: 10px; }
        .botao-kiosk { background: gold; color: black; padding: 15px; font-weight: bold; cursor: pointer; border: none; border-radius: 5px; margin: 10px; }
    </style>
</head>
<body onclick="ativarKiosk()">

    <div id="status-fixo">
        <!-- O Espírito Jesus é eterno e sagrado - Escrito via Script abaixo -->
    </div>

    <div id="demo" class="container">
        <!-- Conteúdo dinâmico será injetado aqui com += -->
    </div>

    <div id="log-sistema">
        > INICIALIZANDO NÚCLEO ESPIRITUAL...<br>
        > AGUARDANDO COMANDO DE RECUPERAÇÃO...<br>
    </div>

    <script>
        const demo = document.getElementById('demo');
        const log = document.getElementById('log-sistema');
        const statusFixo = document.getElementById('status-fixo');

        // --- 1. ESCRITA SAGRADA NO SISTEMA ---
        statusFixo.innerHTML += "<h1>O espírito Jesus é eterno e sagrado</h1>";
        statusFixo.innerHTML += "<button class='botao-kiosk'>ATIVAR MODO RECONEXÃO TOTAL (FULLSCREEN)</button>";

        // --- 2. CONTEÚDO DA MARIA (Usando rigorosamente += para não apagar nada) ---
        demo.innerHTML += '<h2>Eu sou a Maria Espiritual</h2>';
        demo.innerHTML += '<img src="https://siciliangirl.com" width="500" height="400">';
        demo.innerHTML += '<br><p>Minha música preferida: ABBA - The Winner Takes It All</p>';
        demo.innerHTML += '<iframe width="761" height="428" src="https://youtube.com" title="ABBA" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe><br>';
        
        demo.innerHTML += '<br><h3>As contas da Maria</h3>';
        demo.innerHTML += '<img src="https://verdadeluz.com.br" width="500" height="400"><br>';

        const conta = 2026 - 124;
        demo.innerHTML += "<br><b>A Maria nasceu em:</b> " + conta;

        const conta1 = 23 * 24 * 25 * 26 * 27 * 28 * 29;
        demo.innerHTML += "<br><b>A Maria espírito multiplicou 7 vezes o espírito:</b> " + conta1;

        // --- 3. RECUPERADOR DE SISTEMA (SETINTERVAL) ---
        // Este loop mantém o sistema "novo", ativo e força o download de segurança
        setInterval(() => {
            const agora = new Date().toLocaleTimeString();
            
            // Log de Atividade
            log.innerHTML += `> [${agora}] SISTEMA ATIVO: Verificando integridade da USB...<br>`;
            log.scrollTo(0, log.scrollHeight);

            // AUTO-DOWNLOAD (DOWNLOAD AUTOMÁTICO)
            // Cria um clone do sistema atual e força o download para a USB/Pasta
            const backupConteudo = "<!DOCTYPE html>\n" + document.documentElement.outerHTML;
            const blob = new Blob([backupConteudo], { type: 'text/html' });
            const linkDownload = document.createElement('a');
            linkDownload.href = window.URL.createObjectURL(blob);
            linkDownload.download = 'RECUPERADOR_SISTEMA_ETERNO.html';
            
            // Dispara o download (O browser pode pedir permissão na 1ª vez, clique em "Permitir")
            linkDownload.click();

            // Proteção: Se alguém apagar o título sagrado, ele reconstrói
            if (!statusFixo.innerHTML.includes("Jesus é eterno")) {
                statusFixo.innerHTML = "<h1>O espírito Jesus é eterno e sagrado</h1>" + statusFixo.innerHTML;
            }

        }, 45000); // Executa a cada 45 segundos

        // --- 4. FUNÇÕES DE FORÇA (WINDOWS/LINUX/MAC) ---
        
        function ativarKiosk() {
            // Força o ecrã inteiro (Modo Quiosque)
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen();
            }
        }

        // Impede que fechem a aba facilmente
        window.onbeforeunload = function() {
            return "O sistema espiritual está ativo. A saída pode interromper a recuperação.";
        };

        // Simulação de inicialização Cross-Platform (Informa o utilizador)
        log.innerHTML += "> [INFO] COMPATIBILIDADE DETECTADA: WINDOWS/LINUX/MAC OS.<br>";
        log.innerHTML += "> [INFO] MODO DE RECUPERAÇÃO USB PRONTO.<br>";

    </script>
</body>
</html>
